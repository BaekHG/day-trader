name: Deploy to GCE

on:
  push:
    branches: [main]
    paths:
      - 'monitor/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCE_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy monitor to GCE
        run: |
          gcloud compute scp --zone=asia-northeast3-a --recurse \
            monitor/config.py \
            monitor/kis_client.py \
            monitor/naver_data.py \
            monitor/market_data.py \
            monitor/ai_analyzer.py \
            monitor/trader.py \
            monitor/monitor.py \
            monitor/telegram_bot.py \
            monitor/main.py \
            monitor/db.py \
            monitor/stock_scorer.py \
            monitor/backtester.py \
            monitor/requirements.txt \
            harry@ai-shorts-server:/home/harry/day-trader/

      - name: Inject secrets into .env
        run: |
          gcloud compute ssh harry@ai-shorts-server --zone=asia-northeast3-a --command="
            cd /home/harry/day-trader &&
            touch .env &&
            grep -q TELEGRAM_BOT_TOKEN .env && sed -i 's/^TELEGRAM_BOT_TOKEN=.*/TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}/' .env || echo 'TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}' >> .env &&
            grep -q TELEGRAM_CHAT_ID .env && sed -i 's/^TELEGRAM_CHAT_ID=.*/TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}/' .env || echo 'TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}' >> .env
          "

      - name: Install dependencies & verify
        run: |
          gcloud compute ssh harry@ai-shorts-server --zone=asia-northeast3-a --command="
            cd /home/harry/day-trader &&
            test -d venv || python3 -m venv venv &&
            source venv/bin/activate &&
            pip install -q -r requirements.txt &&
            sudo systemctl restart day-trader.service &&
            sleep 8 &&
            sudo systemctl is-active day-trader.service &&
            python3 -c 'from telegram_bot import TelegramBot; TelegramBot().send_message(\"Deploy + Restart complete\")' &&
            echo 'Deploy OK'
          "
