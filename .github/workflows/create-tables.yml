name: Create Supabase Tables
on: workflow_dispatch

jobs:
  create-tables:
    runs-on: ubuntu-latest
    steps:
      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Create tables
        run: |
          python3 << 'EOF'
          import psycopg2

          conn = psycopg2.connect(
              host="db.mbgfgpbjdmzcabujwtiw.supabase.co",
              port=5432,
              dbname="postgres",
              user="postgres",
              password="${{ secrets.SUPABASE_DB_PASSWORD }}",
              connect_timeout=15,
          )
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute("""
          create table if not exists trades (
            id bigint generated always as identity primary key,
            stock_code text not null, stock_name text not null, action text not null,
            quantity int not null, price int not null, amount int not null,
            reason text default '', pnl_amount int default 0, pnl_pct numeric(6,2) default 0,
            traded_at timestamptz default now()
          );
          create table if not exists ai_analyses (
            id bigint generated always as identity primary key,
            market_score int default 0, recommendation text default '', risk_factors text default '',
            favorable_themes jsonb default '[]', picks jsonb default '[]',
            risk_analysis jsonb default '{}', market_summary text default '',
            success_probability int default 0, analyzed_at timestamptz default now()
          );
          create table if not exists daily_reports (
            id bigint generated always as identity primary key,
            report_date date not null, total_trades int default 0,
            total_pnl int default 0, total_pnl_pct numeric(6,2) default 0,
            win_count int default 0, loss_count int default 0,
            trades jsonb default '[]', remaining_positions jsonb default '[]',
            created_at timestamptz default now()
          );
          """)
          print("TABLES CREATED")
          cur.execute("SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE' ORDER BY table_name")
          print("Tables:", [r[0] for r in cur.fetchall()])
          cur.close()
          conn.close()
          EOF
